dataset:

  name: "argoverse1"

  root: "data/argoverse1"

  train_dir: "data/argoverse1/train"

  val_dir: "data/argoverse1/val"

  test_dir: "data/argoverse1/test"

  cache_dir: "data/argoverse1/cache"

  file_extension: ".csv"

  cache_extension: ".pt"

  observation_steps: 20

  prediction_steps: 30

  frame_rate: 10

  max_agents: 128

  target_only: false

  use_map: true

  map_radius: 100.0

  normalize_coordinates: true

  normalize_rotation: true

  debug_scenes: 500

  max_lanes: 256

  lane_sample_points: 20

  agent_agent_radius: 30.0

  lane_agent_radius: 20.0

  max_neighbors: 32

cache:

    enabled: true

    rebuild: false

    version: v1
